# ==========================================================
# ⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
#  檔名：.github/workflows/daily_update.yml
#  版次：v1.2.0 (全區塊視覺化排版版)
# ⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
#  進版說明 (v1.2.0)：
#  1. [格式優化] 捨棄單行註解，全面導入標準化的大型橫幅區塊標籤 (Banner)。
#  2. [穩定性防護] 核心的排程、權限與邏輯縮排 100% 維持不變，確保不失效。
# ==========================================================

name: QBS 量化回測引擎 (v1.2.0)

# ==========================================================
# 1️⃣ 🕒 排程與觸發機制
# ==========================================================
on:
  schedule:
    # 台灣時間 15:00 = UTC 07:00 (避開六日休市)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: 
    inputs: 
      force_reset:
        description: '⚠️ 強制清空舊資料並重抓 5 年歷史資料'
        required: true
        type: boolean
        default: false

# ==========================================================
# 2️⃣ 🔐 系統權限設定 (必要，否則無法將資料庫推回 GitHub)
# ==========================================================
permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      # ==========================================================
      # 3️⃣ 📥 雲端開發環境準備與套件安裝
      # ==========================================================
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        
      - name: 🐍 設定 Python 3.10 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 安裝核心運算套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance
          
      # ==========================================================
      # 4️⃣ 🧠 執行主程式運算與發送通知
      # ==========================================================
      - name: 🧠 執行 v1.2.0 策略運算與 Telegram 推播
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RESET: ${{ inputs.force_reset }} # 將開關狀態傳遞給 Python
        run: python QBS_main.py

      # ==========================================================
      # 5️⃣ 🔄 Git 自動推播機制 (同步更新網頁端)
      # ==========================================================
      - name: 🔄 將最新資料與資料庫推回 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tw50_strategy.db temp_data.csv
          git commit -m "🤖 自動更新：每日回測資料庫與 CSV (v1.2.0)" || echo "資料庫無變動"
          git push

      # ==========================================================
      # 6️⃣ 🗄️ 打包備份回測資料庫 (供手動下載查驗)
      # ==========================================================
      - name: 🗄️ 打包備份回測資料庫
        uses: actions/upload-artifact@v4
        with:
          name: qbs-database-v1.2.0
          path: |
            tw50_strategy.db
            temp_data.csv
          retention-days: 7
